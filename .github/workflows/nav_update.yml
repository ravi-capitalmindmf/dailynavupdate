name: AMFI NAV Daily Update

on:
    schedule:
      - cron: '25 3 * * *'    # 8:55am IST (3:25am UTC)
      - cron: '25 17 * * *'   # 10:55pm IST (5:25pm UTC)
    workflow_dispatch:

jobs:
    update-nav:
      runs-on: ubuntu-latest

      permissions:
        contents: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install pandas openpyxl requests

        - name: Download and process NAV data
          run: |
            python << 'EOF'
            import json, os, sys, requests
            from datetime import datetime, timezone
            import pandas as pd

            url = "https://www.amfiindia.com/api/latest-nav?type=&mfid=81"
            resp = requests.get(url, timeout=30)
            resp.raise_for_status()

            # --- Inspect raw response ---
            print(f"Content-Type : {resp.headers.get('Content-Type', 'unknown')}")
            print(f"Response preview: {resp.text[:300]}")

            # --- Parse: handle text, JSON string, nested dict, or list ---
            raw = resp.text.strip()

            try:
                data = json.loads(raw)
            except json.JSONDecodeError:
                # Might be semicolon/pipe delimited text (AMFI text format)
                from io import StringIO
                df = pd.read_csv(StringIO(raw), sep=';', skipinitialspace=True)
                print(f"Parsed as delimited text. Shape: {df.shape}")
                data = None

            if data is not None:
                # Unwrap double-encoded string
                if isinstance(data, str):
                    data = json.loads(data)

                # Unwrap nested dict — find the list inside
                if isinstance(data, dict):
                    print(f"Response is a dict with keys: {list(data.keys())}")
                    for key in ['data', 'Data', 'result', 'Result', 'nav', 'NAV', 'schemes']:
                        if key in data and isinstance(data[key], list):
                            data = data[key]
                            break
                    else:
                        for v in data.values():
                            if isinstance(v, list) and len(v) > 0:
                                data = v
                                break

                if not isinstance(data, list) or len(data) == 0:
                    print(f"ERROR: Unexpected data structure: {type(data)}")
                    sys.exit(1)

                df = pd.DataFrame(data)

            print(f"Columns: {list(df.columns)}")
            print(f"Rows: {len(df)}")
            print(df.head(2).to_string())

            df['Downloaded_At_UTC'] = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S')

            excel_path = 'nav_history/nav_mfid81.xlsx'
            os.makedirs('nav_history', exist_ok=True)

            if os.path.exists(excel_path):
                existing = pd.read_excel(excel_path, engine='openpyxl')
                combined = pd.concat([existing, df], ignore_index=True)
                combined.to_excel(excel_path, index=False, engine='openpyxl')
                print(f"Appended {len(df)} rows. Total rows: {len(combined)}")
            else:
                df.to_excel(excel_path, index=False, engine='openpyxl')
                print(f"Created new file with {len(df)} rows")

            nav_date = df['Date'].iloc[0] if 'Date' in df.columns else 'unknown'
            print(f"NAV date in data: {nav_date}")
            EOF

        - name: Commit and push
          run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "GitHub Actions"
            git add nav_history/nav_mfid81.xlsx
            git diff --cached --quiet && echo "No changes to commit" || \
              git commit -m "NAV update $(date -u '+%Y-%m-%d %H:%M UTC') mfid=81"
            git push
