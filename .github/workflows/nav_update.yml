name: AMFI NAV Daily Update

on:
    schedule:
      - cron: '25 3 * * *'    # 8:55am IST
      - cron: '25 17 * * *'   # 10:55pm IST
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    update-nav:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - run: pip install pandas openpyxl requests

        - name: Download and process NAV data
          run: |
            python << 'EOF'
            import json, os, sys, requests
            from datetime import datetime, timezone
            import pandas as pd

            url = "https://www.amfiindia.com/api/latest-nav?type=&mfid=81"
            resp = requests.get(url, timeout=30)
            resp.raise_for_status()
            
            raw = resp.text.strip()
            print(f"Content-Type : {resp.headers.get('Content-Type', 'unknown')}")
            print(f"Raw preview  : {raw[:400]}")
            
            # ── Parse nested JSON ──────────────────────────────────────────────────────
            parsed = json.loads(raw)
            
            # Unwrap double-encoded string if needed
            if isinstance(parsed, str):
                parsed = json.loads(parsed)
                
            # Navigate: data[*].categories[*].groups[*].schemes[*]
            rows = []
            for type_block in parsed.get("data", []):
                for cat_block in type_block.get("categories", []):
                    for group in cat_block.get("groups", []):
                        for scheme in group.get("schemes", []):
                            rows.append({
                            "mutualfundname":      scheme.get("mutualFundName", ""),
                            "mutualfundid":        scheme.get("mutualFundId", ""),
                            "type":                scheme.get("type", ""),
                            "category":            scheme.get("category", ""),
                            "schemeid":            scheme.get("schemeId", ""),
                            "isinprimary":         scheme.get("ISINPrimary", ""),
                            "isinreinvestment":    scheme.get("ISINReinvestment", ""),
                            "schemename":          scheme.get("schemeName", ""),
                            "date":                scheme.get("date", ""),
                            "netassetvalue":       scheme.get("netAssetValue", ""),
                            "downloaded_at_utc":   datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S'),
                          })
            if not rows:
                    print(f"ERROR: No scheme rows extracted. Full raw:\n{raw}")
                    sys.exit(1)
                
            df = pd.DataFrame(rows)
            print(f"\nColumns : {list(df.columns)}")
            print(f"Rows    : {len(df)}")
            print(f"\nSample row:\n{df.iloc[0].to_dict()}")
            
            # ── Write to Excel ─────────────────────────────────────────────────────────
            excel_path = 'nav_history/nav_mfid81.xlsx'
            os.makedirs('nav_history', exist_ok=True)
            
            EXPECTED_COLS = set(df.columns)
            
            if os.path.exists(excel_path):
                existing = pd.read_excel(excel_path, engine='openpyxl')
                existing.columns = [str(c).strip() for c in existing.columns]
                if set(existing.columns) == EXPECTED_COLS:
                    combined = pd.concat([existing, df], ignore_index=True)
                    combined.to_excel(excel_path, index=False, engine='openpyxl')
                    print(f"\nAppended {len(df)} rows. Total: {len(combined)}")
                else:
                    print(f"\nColumn mismatch — recreating file")
                    print(f"  Existing : {sorted(existing.columns)}")
                    print(f"  New      : {sorted(df.columns)}")
                    df.to_excel(excel_path, index=False, engine='openpyxl')
                    print(f"Created new file with {len(df)} rows")
            else:
                df.to_excel(excel_path, index=False, engine='openpyxl')
                print(f"Created new file with {len(df)} rows")

            print(f"\nNAV date: {df['date'].iloc[0]}")
            EOF

        - name: Commit and push
          run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "GitHub Actions"
            git add nav_history/nav_mfid81.xlsx
            git diff --cached --quiet && echo "No changes to commit" || \
              git commit -m "NAV update $(date -u '+%Y-%m-%d %H:%M UTC') mfid=81"
            git push
